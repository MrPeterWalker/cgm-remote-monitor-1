services:
  - type: web
    name: dexcom-reader
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DEXCOM_USERNAME
        sync: false
      - key: DEXCOM_PASSWORD
        sync: false
      - key: DEXCOM_SERVER
        value: US
      - key: API_KEY
        sync: false
      - key: NODE_VERSION
        value: 20.11.1
